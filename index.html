    // Sync code - stored in localStorage, shared across devices
    const SYNC_CODE_KEY = "daily-grind-sync-code";
    window._getSyncCode = () => localStorage.getItem(SYNC_CODE_KEY);
    window._setSyncCode = (code) => {
      if (code) localStorage.setItem(SYNC_CODE_KEY, code);
      else localStorage.removeItem(SYNC_CODE_KEY);
    };

    // Storage that syncs localStorage + Firestore via sync code
    window.storage = {
      async get(key) {
        try {
          const raw = localStorage.getItem(key);
          const localData = raw !== null ? { key, value: raw } : null;

          const syncCode = window._getSyncCode();
          if (syncCode) {
            await _fbReady;
            try {
              const doc = await fbDb.collection("sync").doc(syncCode).collection("data").doc(key).get();
              if (doc.exists) {
                const fbValue = doc.data().value;
                localStorage.setItem(key, fbValue);
                return { key, value: fbValue };
              } else if (localData) {
                await fbDb.collection("sync").doc(syncCode).collection("data").doc(key).set({ value: localData.value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
              }
            } catch (e) { console.warn("Firestore get failed:", e); }
          }
          return localData;
        } catch { return null; }
      },
      async set(key, value) {
        try {
          localStorage.setItem(key, value);

          const syncCode = window._getSyncCode();
          if (syncCode) {
            await _fbReady;
            fbDb.collection("sync").doc(syncCode).collection("data").doc(key).set({
              value: value,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).catch((e) => console.warn("Firestore set failed:", e));
          }
          return { key, value };
        } catch { return null; }
      }
    };

function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function getToday() { return localDateStr(new Date()); }
function getYesterday() { const d = new Date(); d.setDate(d.getDate() - 1); return localDateStr(d); }
function getWeekDates() {
  const today = new Date(); const dow = today.getDay();
  const satOff = dow >= 6 ? dow - 6 : dow + 1;
  const sat = new Date(today); sat.setDate(today.getDate() - satOff);
  return Array.from({ length: 7 }, (_, i) => { const d = new Date(sat); d.setDate(sat.getDate() + i); return localDateStr(d); });
}
function allHabits(secs) { return secs.flatMap((s) => s.items); }
function habitScore(tl, secs) { return allHabits(secs).reduce((sc, i) => sc + (tl[i.id] === "done" ? i.points : 0), 0); }
function taskScore(lists) { return lists.flatMap((l) => l.items).reduce((sc, t) => sc + (t.done ? t.points : 0), 0); }
function getStreak(id, log, today) {
  if (log[today]?.[id] !== "done") return 0; let s = 1;
  const d = new Date(today + "T12:00:00");
  for (let i = 1; i < 365; i++) { const p = new Date(d); p.setDate(d.getDate() - i); if (log[localDateStr(p)]?.[id] === "done") s++; else break; }
  return s;
}
function getOverall(id, log) { const ds = Object.keys(log); if (!ds.length) return 0; return Math.round((ds.filter((d) => log[d]?.[id] === "done").length / ds.length) * 100); }
const statusCycle = [undefined, "done", "skip", "neutral"];

  const completed = list.items.filter((t) => t.done);

  function handleAdd() {
    if (!text.trim()) return;
    onAdd(list.id, text.trim(), Math.max(0, parseInt(pts) || 0));
    setText(""); setPts("");

}

function DailyGrind() {

  const save = useCallback(async (nd) => { setData(nd); try { await window.storage.set(STORAGE_KEY, JSON.stringify(nd)); } catch (e) { console.error(e); } }, []);

  // Day rollover
  useEffect(() => {
    if (!data) return;
    const yday = getYesterday();
    if (data.log[yday] && !data.history[yday]) {
      const yLog = data.log[yday];
      const hs = allHabits(data.habitSections).reduce((sc, i) => sc + (yLog[i.id] === "done" ? i.points : 0), 0);
      const ts = data.taskLists.flatMap((l) => l.items).reduce((sc, t) => sc + (t.done ? t.points : 0), 0);
      const totalScore = hs + ts;
      const won = totalScore >= data.dailyGoal;
      const nh = { ...data.history, [yday]: { score: totalScore, goal: data.dailyGoal, won } };
      let ns = data.streak;
      if (won) { const db = new Date(yday + "T12:00:00"); db.setDate(db.getDate() - 1); ns = (!data.lastCompletedDate || data.lastCompletedDate === localDateStr(db)) ? ns + 1 : 1; } else ns = 0;
      const resetLists = data.taskLists.map((l) => l.resetsDaily ? { ...l, items: l.items.map((t) => ({ ...t, done: false })) } : l);
      save({ ...data, history: nh, streak: ns, lastCompletedDate: won ? yday : data.lastCompletedDate, taskLists: resetLists, lastTaskResetDate: today });
    }
    if (data.lastTaskResetDate && data.lastTaskResetDate !== today && !data.history[yday]) {
      const resetLists = data.taskLists.map((l) => l.resetsDaily ? { ...l, items: l.items.map((t) => ({ ...t, done: false })) } : l);

      save({ ...data, lastTaskResetDate: today });
    }
  }, [data, save]);

  const getTL = () => data?.log[today] || {};

  function toggleHabit(itemId) {
    const tl = getTL(); const cur = tl[itemId]; const next = statusCycle[(statusCycle.indexOf(cur) + 1) % statusCycle.length];
    const ntl = { ...tl }; if (next === undefined) { delete ntl[itemId]; delete ntl[itemId + "_note"]; } else ntl[itemId] = next;

  function addHabit(secId) {

  const deleteTaskList = useCallback((listId) => {
    setData((prev) => {
      const nd = { ...prev, taskLists: prev.taskLists.filter((l) => l.id !== listId) };
      window.storage.set(STORAGE_KEY, JSON.stringify(nd)).catch(console.error);
      return nd;
    });
  }, []);

  function addNewList() {
    if (!newListName.trim()) return;
    const list = { id: `tl_${Date.now()}`, title: newListName.trim(), items: [] };
    save({ ...data, taskLists: [...data.taskLists, list] });
    setNewListName(""); setShowNewList(false);
  }
  function saveGoal() { const v = Math.max(1, parseInt(goalInput) || 200); save({ ...data, dailyGoal: v }); setGoalInput(String(v)); setView("main"); }
  function resetAll() { save(mkDefault()); setGoalInput("200"); setView("main"); setPage("habits"); }

  useEffect(() => {
    if (!data) return;

    if (sc >= data.dailyGoal && prevScoreRef.current < data.dailyGoal && data.dailyGoal > 0) { setWinAnim(true); setTimeout(() => setWinAnim(false), 3000); }

  // Pomodoro timer
  useEffect(() => {
    if (!pomoRunning) return;
    const i = setInterval(() => {
      setPomoSeconds((s) => {
        if (s <= 1) {
          setPomoRunning(false);
          if (!pomoIsBreak) { setPomoSessions((p) => p + 1); setPomoIsBreak(true); return pomoBreak * 60; }
          else { setPomoIsBreak(false); return pomoWork * 60; }

    }, 1000);
    return () => clearInterval(i);
  }, [pomoRunning, pomoIsBreak, pomoWork, pomoBreak]);

  // Custom timer
  useEffect(() => {
    if (!customTimerRunning) return;
    const i = setInterval(() => {
      setCustomTimerSec((s) => { if (s <= 1) { setCustomTimerRunning(false); return 0; } return s - 1; });
    }, 1000);

  // Stopwatch
  useEffect(() => {
    if (!stopwatchRunning) return;

  if (loading || !data) return <div style={S.shell}><div style={{ ...S.box, paddingTop: 120, textAlign: "center" }}><span style={{ color: "#8b8b9e", fontSize: 11, letterSpacing: 4 }}>LOADING...</span></div></div>;

  function getEventsForDate(dateStr) {
    const d = new Date(dateStr + "T12:00");
    const dayOfWeek = d.getDay(); // 0=Sun, 1=Mon, etc.
    const directEvents = calEvents.filter(e => e.date === dateStr);
    const repeatingEvents = calEvents.filter(e => {
      if (!e.repeat) return false;
      const eDate = new Date(e.date + "T12:00");
      if (eDate > d) return false; // don't show before the original date
      if (e.date === dateStr) return false; // already in directEvents
      if (e.repeat === "weekly") {
        return eDate.getDay() === dayOfWeek;
      }
      if (e.repeat === "daily") return true;
      if (e.repeat === "weekdays") return dayOfWeek >= 1 && dayOfWeek <= 5;
      return false;
    }).map(e => ({ ...e, _repeating: true, _origId: e.id, id: e.id + "_" + dateStr }));
    return [...directEvents, ...repeatingEvents];
  }
  function getCalWeekDates(offset) {
    const d = new Date(); d.setDate(d.getDate() + offset * 7);
    const day = d.getDay(); const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    const mon = new Date(d); mon.setDate(diff);
    return Array.from({ length: 7 }, (_, i) => { const dd = new Date(mon); dd.setDate(mon.getDate() + i); return dd; });
  }

  const tl = getTL();
  const hScore = habitScore(tl, data.habitSections);
  const tScore = taskScore(data.taskLists);
  const score = hScore + tScore;
  const prog = data.dailyGoal > 0 ? Math.min(1, score / data.dailyGoal) : 0;
  const won = score >= data.dailyGoal && data.dailyGoal > 0;
  const allH = allHabits(data.habitSections);
  const allT = data.taskLists.flatMap((l) => l.items);
  const doneN = Object.values(tl).filter((v) => v === "done").length + allT.filter((t) => t.done).length;
  const totalN = allH.length + allT.length;

  const navIcons = {
    habits: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
    tasks: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>,
    timer: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><line x1="12" y1="1" x2="12" y2="3"/></svg>,
    calendar: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,

  const Nav = () => (

        </button>
      ))}
    </div>
  );

  const HabitCard = ({ item, secId }) => {
    const streak = getStreak(item.id, data.log, today);
    const overall = getOverall(item.id, data.log);
    const todayStatus = tl[item.id];
    const todayNote = tl[item.id + "_note"] || "";
    const [showPicker, setShowPicker] = useState(false);
    const [showComment, setShowComment] = useState(false);
    const [commentText, setCommentText] = useState(todayNote);
    const [showDesc, setShowDesc] = useState(false);
    const [showMonthly, setShowMonthly] = useState(false);
    const [monthOffset, setMonthOffset] = useState(0);

    function pickStatus(st) {
      const ntl = { ...tl };
      if (st === undefined) { delete ntl[item.id]; delete ntl[item.id + "_note"]; }
      else ntl[item.id] = st;
      save({ ...data, log: { ...data.log, [today]: ntl } });
      setShowPicker(false); setShowComment(false);
    }

    function saveComment() {
      save({ ...data, log: { ...data.log, [today]: { ...tl, [item.id + "_note"]: commentText.trim() } } });
      setShowComment(false); setShowPicker(false);
    }

    return (
      <div style={S.card}>
        <div style={{ display: "flex", alignItems: "flex-start" }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={S.cardHead} onClick={() => { setEditItem(item); setEditSection(secId); setFormName(item.name); setFormPoints(String(item.points)); setFormDesc(item.desc || ""); setFormComment(tl[item.id + "_note"] || ""); setView("editHabit"); }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <span style={S.cardName}>{item.name}</span>
              </div>
              <span style={S.cardPts}>+{item.points}</span>
            </div>
            <div style={S.cardMeta}>Streak: +{streak}  |  Overall: {overall}%</div>
          </div>
          {item.desc && <button onClick={() => setShowDesc(!showDesc)} style={{ background: "none", border: "none", color: "#8b8b9e", fontSize: 18, cursor: "pointer", padding: "4px 2px 4px 8px", marginTop: 2, transition: "transform 0.2s", transform: showDesc ? "rotate(180deg)" : "rotate(0deg)" }}>{"\u25BE"}</button>}
        </div>
        {item.desc && showDesc && <div style={S.cardDesc}>{item.desc}</div>}
        <div style={{ position: "relative" }}>
          <div style={S.week}>
            {weekDates.map((date, i) => {
              const st = data.log[date]?.[item.id];
              const nt = data.log[date]?.[item.id + "_note"];
              const isT = date === today, isF = date > today;
              let bg = "#2d2d3a", clr = "#aaaabb", bdr = "2px solid transparent", lbl = "";
              if (st === "done") { bg = "#4cd137"; clr = "#fff"; }
              else if (st === "skip") { bg = "#e84118"; clr = "#fff"; }
              else if (st === "neutral") { bg = "#636e72"; clr = "#fff"; }
              if (nt && !st) { bg = "#4cd13744"; bdr = "2px solid #4cd137"; lbl = "\u00B7\u00B7\u00B7"; clr = "#4cd137"; }
              else if (nt && st) { bdr = `2px solid ${st === "done" ? "#4cd137" : st === "skip" ? "#e84118" : "#636e72"}`; }
              if (isT) {
                bdr = "2px solid #c4b5fd";
                lbl = st === "done" ? "\u2713" : st === "skip" ? "\u2717" : st === "neutral" ? "\u2014" : nt ? "\u00B7\u00B7\u00B7" : "\u00B7\u00B7\u00B7";

              return (
                <div key={date} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, flex: 1 }}>

            </div>

        </div>
        {todayNote && !showPicker && (

        <div style={{ marginTop: 8, textAlign: "center" }}>
          <button onClick={() => { setShowMonthly(!showMonthly); setMonthOffset(0); }} style={{ background: "none", border: "none", color: showMonthly ? "#7c3aed" : "#555566", fontSize: 14, cursor: "pointer", padding: "4px 8px", fontFamily: "inherit" }}>{showMonthly ? "\u25B2 Hide Calendar" : "\u25BC Monthly View"}</button>

        {showMonthly && (() => {

          const firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const dayNames = ["Mo","Tu","We","Th","Fr","Sa","Su"];
          const cells = [];
          for (let i = 0; i < firstDay; i++) cells.push(null);
          for (let d = 1; d <= daysInMonth; d++) cells.push(d);
          const todayDate = new Date();
          let doneCount = 0, skipCount = 0, totalDays = 0;
          for (let d = 1; d <= daysInMonth; d++) {
            const ds = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            if (ds > today) break;
            totalDays++;
            const st = data.log[ds]?.[item.id];
            if (st === "done") doneCount++;
            else if (st === "skip") skipCount++;
          }
          return (
            <div style={{ marginTop: 8, padding: "10px 4px", borderTop: "1px solid #2d2d3a" }}>

                <span style={{ fontSize: 13, fontWeight: 700, color: "#f0f0f4", letterSpacing: 1 }}>{monthName}</span>
                <button onClick={() => setMonthOffset(Math.min(monthOffset + 1, 0))} disabled={monthOffset >= 0} style={{ background: "none", border: "none", color: monthOffset >= 0 ? "#333" : "#8b8b9e", fontSize: 18, cursor: monthOffset >= 0 ? "default" : "pointer", padding: "4px 10px" }}>{"\u25B6"}</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 3, textAlign: "center" }}>
                {dayNames.map(dn => <div key={dn} style={{ fontSize: 9, color: "#555566", fontWeight: 700, padding: "2px 0" }}>{dn}</div>)}
                {cells.map((d, i) => {
                  if (d === null) return <div key={"e"+i} />;
                  const ds = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
                  const st = data.log[ds]?.[item.id];
                  const nt = data.log[ds]?.[item.id + "_note"];
                  const isFuture = ds > today;
                  const isToday = ds === today;
                  let bg = "#2d2d3a", clr = "#666";
                  if (st === "done") { bg = "#4cd137"; clr = "#fff"; }
                  else if (st === "skip") { bg = "#e84118"; clr = "#fff"; }
                  else if (st === "neutral") { bg = "#636e72"; clr = "#fff"; }
                  else if (nt) { bg = "#4cd13744"; clr = "#4cd137"; }
                  return (
                    <div key={d} style={{ width: "100%", aspectRatio: "1", borderRadius: "50%", background: isFuture ? "#1a1a2e" : bg, color: isFuture ? "#333" : clr, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: isToday ? 900 : 600, border: isToday ? "2px solid #c4b5fd" : "2px solid transparent", opacity: isFuture ? 0.3 : 1 }}>{d}</div>
                  );
                })}
              </div>
              <div style={{ display: "flex", justifyContent: "center", gap: 16, marginTop: 10, fontSize: 10, color: "#8b8b9e" }}>
                <span>{"\u2705"} {doneCount}/{totalDays}</span>
                <span>{"\u274C"} {skipCount}/{totalDays}</span>
                <span>{totalDays > 0 ? Math.round(doneCount/totalDays*100) : 0}% done</span>
              </div>
            </div>
          );
        })()}
      </div>
    );
  };

  // MAIN
  if (view === "main") return (
    <div style={S.shell}>
      <div style={S.box}>
        {page !== "calendar" && winAnim && <div style={S.win}><div style={{ fontSize: 48, marginBottom: 12 }}>{"\u26A1"}</div><div style={S.winTxt}>MISSION COMPLETE</div><div style={S.winSub}>{score}/{data.dailyGoal} pts</div></div>}

        {page !== "calendar" && <div style={{ marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <h1 style={S.title}>DAILY GRIND</h1>
            <div style={S.date}>{new Date().toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" })}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            {data.streak > 0 && <div style={S.streakB}>{"\uD83D\uDD25"} {data.streak}</div>}
            <button onClick={() => setView("settings")} style={S.gear}>{"\u2699"}</button>
          </div>
        </div>}

        <div style={{ ...S.sc, cursor: "pointer", display: page === "calendar" ? "none" : "block" }} onClick={() => setShowScoreDetail(!showScoreDetail)}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 12 }}>
            <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
              <span style={{ fontSize: 42, fontWeight: 900, lineHeight: 1, color: won ? "#00ff87" : prog > 0.7 ? "#ffd43b" : "#7c3aed" }}>{score}</span>
              <span style={{ fontSize: 18, color: "#8b8b9e" }}>/ {data.dailyGoal}</span>
            </div>
            <div style={{ textAlign: "right" }}>
              <span style={{ fontSize: 11, color: "#8b8b9e", letterSpacing: 1 }}>{doneN}/{totalN}</span>
              <div style={{ fontSize: 8, color: "#555566", marginTop: 2 }}>{showScoreDetail ? "\u25B2 tap to close" : "\u25BC tap for details"}</div>
            </div>
          </div>
          <div style={S.tr}><div style={{ ...S.fl, width: `${prog * 100}%`, background: won ? "linear-gradient(90deg,#00ff87,#00d9ff)" : prog > 0.7 ? "linear-gradient(90deg,#ffd43b,#ff922b)" : "linear-gradient(90deg,#7c3aed,#c4b5fd)", boxShadow: won ? "0 0 20px #00ff8744" : "none" }} /></div>
          <div style={{ fontSize: 10, color: "#8b8b9e", letterSpacing: 2, textTransform: "uppercase", marginTop: 8 }}>
            {won ? "TARGET HIT" : `${data.dailyGoal - score} to go`}
            {(hScore > 0 || tScore > 0) ? ` \u00B7 H:${hScore} \u00B7 T:${tScore}` : ""}
          </div>
        </div>

        {showScoreDetail && (
          <div style={{ background: "#1a1a2e", border: "1px solid #2d2d3a", borderRadius: 12, padding: "16px", marginBottom: 20, marginTop: -12 }}>
            <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 3, color: "#8b8b9e", marginBottom: 12 }}>TODAY'S COMPLETED</div>
            {allH.filter((h) => tl[h.id] === "done").length > 0 && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 9, color: "#555566", letterSpacing: 2, marginBottom: 6 }}>HABITS</div>
                {allH.filter((h) => tl[h.id] === "done").map((h) => (
                  <div key={h.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: "1px solid #2d2d3a" }}>
                    <button onClick={(e) => { e.stopPropagation(); toggleHabit(h.id); }} style={{ width: 22, height: 22, borderRadius: 11, background: "#4cd137", border: "none", color: "#fff", fontSize: 12, fontWeight: 800, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{"\u2713"}</button>
                    <span style={{ flex: 1, fontSize: 12, color: "#f0f0f4" }}>{h.name}</span>
                    <span style={{ fontSize: 10, color: "#4cd137", fontWeight: 700 }}>+{h.points}</span>
                  </div>
                ))}
              </div>
            )}
            {allT.filter((t) => t.done).length > 0 && (
              <div style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 9, color: "#555566", letterSpacing: 2, marginBottom: 6 }}>TASKS</div>
                {data.taskLists.flatMap((list) => list.items.filter((t) => t.done).map((t) => ({ ...t, listId: list.id, listTitle: list.title }))).map((t) => (
                  <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: "1px solid #2d2d3a" }}>
                    <button onClick={(e) => { e.stopPropagation(); toggleTask(t.listId, t.id); }} style={{ width: 22, height: 22, borderRadius: 11, background: "#4cd137", border: "none", color: "#fff", fontSize: 12, fontWeight: 800, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{"\u2713"}</button>
                    <span style={{ flex: 1, fontSize: 12, color: "#f0f0f4" }}>{t.name}</span>
                    <span style={{ fontSize: 10, color: "#4cd137", fontWeight: 700 }}>{t.points > 0 ? `+${t.points}` : ""}</span>

            <div style={{ fontSize: 9, color: "#555566", textAlign: "center", marginTop: 8 }}>Tap the green {"\u2713"} to undo a completion</div>
          </div>
        )}

        {page === "habits" && data.habitSections.map((sec) => {
          const sp = sec.items.reduce((s, i) => s + (tl[i.id] === "done" ? i.points : 0), 0);

                  <input value={pomoTask} onChange={(e) => setPomoTask(e.target.value)}

                  {pomoTask && <div style={{ fontSize: 10, color: "#f0f0f4", marginTop: 6, fontWeight: 700, letterSpacing: 1 }}>WORKING ON: {pomoTask}</div>}
                </div>
                <div style={{ position: "relative", width: 180, height: 180, margin: "0 auto 20px" }}>
                  <svg width="180" height="180" style={{ transform: "rotate(-90deg)" }}>
                    <circle cx="90" cy="90" r="80" fill="none" stroke="#2d2d3a" strokeWidth="6" />
                    <circle cx="90" cy="90" r="80" fill="none" stroke={pomoIsBreak ? "#00ff87" : "#7c3aed"} strokeWidth="6"
                      strokeDasharray={2 * Math.PI * 80} strokeDashoffset={2 * Math.PI * 80 * (1 - pomoProg)} strokeLinecap="round" style={{ transition: "stroke-dashoffset 1s linear" }} />
                  </svg>
                  <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                    <span style={{ fontSize: 40, fontWeight: 900, color: "#f0f0f4", fontFamily: "inherit" }}>{fmtSec(pomoSeconds)}</span>
                    <span style={{ fontSize: 10, color: "#8b8b9e", marginTop: 4 }}>Session #{pomoSessions + 1}</span>
                  </div>
                </div>
                <div style={{ display: "flex", justifyContent: "center", gap: 12, marginBottom: 16 }}>
                  <button onClick={() => setPomoRunning(!pomoRunning)} style={{ ...S.okBtn, flex: "none", padding: "12px 28px", fontSize: 13, borderRadius: 24 }}>
                    {pomoRunning ? "\u23F8 Pause" : "\u25B6 Start"}
                  </button>
                  <button onClick={() => { setPomoRunning(false); setPomoIsBreak(false); setPomoSeconds(pomoWork * 60); }} style={{ ...S.cBtn, flex: "none", padding: "12px 20px", borderRadius: 24 }}>
                    {"\u21BA"} Reset
                  </button>
                </div>
                <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                  <div style={{ textAlign: "center" }}>
                    <label style={{ fontSize: 8, color: "#8b8b9e", letterSpacing: 2, fontWeight: 700 }}>WORK</label>
                    <input type="number" value={pomoWork} onChange={(e) => { const v = Math.max(1, parseInt(e.target.value) || 25); setPomWork(v); if (!pomoRunning && !pomoIsBreak) setPomoSeconds(v * 60); }}
                      style={{ ...S.inp, width: 60, textAlign: "center", padding: "6px", fontSize: 13, marginTop: 4 }} />
                  </div>
                  <div style={{ textAlign: "center" }}>
                    <label style={{ fontSize: 8, color: "#8b8b9e", letterSpacing: 2, fontWeight: 700 }}>BREAK</label>
                    <input type="number" value={pomoBreak} onChange={(e) => { const v = Math.max(1, parseInt(e.target.value) || 5); setPomBreak(v); if (!pomoRunning && pomoIsBreak) setPomoSeconds(v * 60); }}
                      style={{ ...S.inp, width: 60, textAlign: "center", padding: "6px", fontSize: 13, marginTop: 4 }} />
                  </div>
                </div>
                <div style={{ fontSize: 10, color: "#8b8b9e", marginTop: 12 }}>Sessions completed: {pomoSessions}</div>
              </div>

              <div style={{ background: "#1a1a2e", border: "1px solid #2d2d3a", borderRadius: 14, padding: "24px 20px", marginBottom: 16, textAlign: "center" }}>
                <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 4, color: "#ffd43b", marginBottom: 16 }}>{"\u23F1"} COUNTDOWN TIMER</div>
                <div style={{ fontSize: 36, fontWeight: 900, color: customTimerSec > 0 ? "#ffd43b" : "#f0f0f4", marginBottom: 16, fontFamily: "inherit" }}>{fmtSec(customTimerSec)}</div>
                {!customTimerRunning && customTimerSec === 0 && (
                  <div style={{ display: "flex", gap: 8, justifyContent: "center", marginBottom: 12 }}>
                    <input type="number" placeholder="min" value={customTimerMin} onChange={(e) => setCustomTimerMin(e.target.value)}
                      style={{ ...S.inp, width: 70, textAlign: "center", padding: "8px" }} />
                    <button onClick={() => { const s = Math.max(1, parseInt(customTimerMin) || 5) * 60; setCustomTimerSec(s); }} style={{ ...S.okBtn, flex: "none", padding: "8px 16px", background: "linear-gradient(135deg, #ffd43b, #ff922b)", color: "#f8f8fa" }}>Set</button>
                  </div>
                )}
                <div style={{ display: "flex", justifyContent: "center", gap: 10 }}>
                  <button onClick={() => setCustomTimerRunning(!customTimerRunning)} disabled={customTimerSec === 0}
                    style={{ ...S.okBtn, flex: "none", padding: "10px 24px", borderRadius: 20, opacity: customTimerSec === 0 ? 0.3 : 1, background: "linear-gradient(135deg, #ffd43b, #ff922b)", color: "#f8f8fa" }}>
                    {customTimerRunning ? "\u23F8 Pause" : "\u25B6 Start"}
                  </button>
                  <button onClick={() => { setCustomTimerRunning(false); setCustomTimerSec(0); }} style={{ ...S.cBtn, flex: "none", padding: "10px 16px", borderRadius: 20 }}>{"\u21BA"}</button>
                </div>
              </div>

              <div style={{ background: "#1a1a2e", border: "1px solid #2d2d3a", borderRadius: 14, padding: "24px 20px", textAlign: "center" }}>
                <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 4, color: "#00ff87", marginBottom: 16 }}>{"\u23F1"} STOPWATCH</div>
                <div style={{ fontSize: 36, fontWeight: 900, color: stopwatchRunning ? "#00ff87" : "#f0f0f4", marginBottom: 16, fontFamily: "inherit" }}>
                  {`${String(Math.floor(stopwatchSec / 3600)).padStart(2, "0")}:${String(Math.floor((stopwatchSec % 3600) / 60)).padStart(2, "0")}:${String(stopwatchSec % 60).padStart(2, "0")}`}
                </div>
                <div style={{ display: "flex", justifyContent: "center", gap: 10 }}>
                  <button onClick={() => setStopwatchRunning(!stopwatchRunning)} style={{ ...S.okBtn, flex: "none", padding: "10px 24px", borderRadius: 20, background: "linear-gradient(135deg, #00ff87, #00d9ff)", color: "#f8f8fa" }}>
                    {stopwatchRunning ? "\u23F8 Pause" : "\u25B6 Start"}
                  </button>
                  <button onClick={() => { setStopwatchRunning(false); setStopwatchSec(0); }} style={{ ...S.cBtn, flex: "none", padding: "10px 16px", borderRadius: 20 }}>{"\u21BA"}</button>
                </div>
              </div>
            </div>
          );
        })()}

        {page === "calendar" && (() => {
          const calDates = getCalWeekDates(calWeekOffset);
          const hours = Array.from({ length: 18 }, (_, i) => i + 6); // 6 AM to 11 PM
          const HOUR_H = 60; // pixels per hour
          const todayStr = getToday();
          const dayNames = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

          function timeToMin(t) { const [h, m] = t.split(":").map(Number); return h * 60 + m; }
          function fmtHour(h) { if (h === 0) return "12 AM"; if (h < 12) return h + " AM"; if (h === 12) return "12 PM"; return (h - 12) + " PM"; }

          const weekStart = calDates[0];
          const weekEnd = calDates[6];
          const monthLabel = weekStart.getMonth() === weekEnd.getMonth()
            ? weekStart.toLocaleString("default", { month: "long", year: "numeric" })
            : weekStart.toLocaleString("default", { month: "short" }) + " - " + weekEnd.toLocaleString("default", { month: "short", year: "numeric" });

          return (
            <div>
              {/* Header */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <button onClick={() => setCalWeekOffset(calWeekOffset - 1)} style={{ background: "none", border: "none", color: "#8b8b9e", fontSize: 20, cursor: "pointer", padding: "4px 12px" }}>{"\u25C0"}</button>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 14, fontWeight: 800, color: "#f0f0f4", letterSpacing: 1 }}>{monthLabel}</div>
                  <button onClick={() => setCalWeekOffset(0)} style={{ background: "none", border: "none", color: "#7c3aed", fontSize: 10, cursor: "pointer", fontWeight: 700, letterSpacing: 2, padding: "4px 8px" }}>TODAY</button>
                </div>
                <button onClick={() => setCalWeekOffset(calWeekOffset + 1)} style={{ background: "none", border: "none", color: "#8b8b9e", fontSize: 20, cursor: "pointer", padding: "4px 12px" }}>{"\u25B6"}</button>
              </div>

              {/* Day headers */}
              <div style={{ display: "grid", gridTemplateColumns: "40px repeat(7, 1fr)", gap: 0, marginBottom: 2 }}>
                <div />
                {calDates.map((d, i) => {
                  const ds = localDateStr(d);
                  const isToday = ds === todayStr;
                  return (
                    <div key={i} style={{ textAlign: "center", padding: "4px 0" }}>
                      <div style={{ fontSize: 9, color: isToday ? "#7c3aed" : "#555566", fontWeight: 700, letterSpacing: 1 }}>{dayNames[i]}</div>
                      <div style={{ fontSize: 16, fontWeight: 800, color: isToday ? "#fff" : "#8b8b9e", background: isToday ? "#7c3aed" : "transparent", borderRadius: "50%", width: 28, height: 28, display: "flex", alignItems: "center", justifyContent: "center", margin: "2px auto 0" }}>{d.getDate()}</div>
                    </div>
                  );
                })}
              </div>

              {/* Time grid */}
              <div style={{ overflowX: "auto", overflowY: "auto", maxHeight: "calc(100vh - 160px)", background: "#1a1a2e", border: "1px solid #2d2d3a", borderRadius: 12 }}>
                <div ref={calGridRef} style={{ display: "grid", gridTemplateColumns: "40px repeat(7, 1fr)", position: "relative", minHeight: hours.length * HOUR_H, userSelect: "none", WebkitUserSelect: "none" }}
                  onMouseMove={(e) => {
                    if (!calDragging || !calGridRef.current) return;
                    const rect = calGridRef.current.getBoundingClientRect();
                    const y = e.clientY - rect.top;
                    const x = e.clientX - rect.left;
                    const totalMin = Math.round((y / HOUR_H) * 60) + 360;
                    const snapped = Math.round(totalMin / 15) * 15;
                    const duration = timeToMin(calDragging.origEnd) - timeToMin(calDragging.origStart);
                    const newStart = `${String(Math.floor(snapped/60)).padStart(2,"0")}:${String(snapped%60).padStart(2,"0")}`;
                    const endMin = snapped + duration;
                    const newEnd = `${String(Math.floor(endMin/60)).padStart(2,"0")}:${String(endMin%60).padStart(2,"0")}`;
                    const colW = (rect.width - 40) / 7;
                    const dayIdx = Math.max(0, Math.min(6, Math.floor((x - 40) / colW)));
                    const newDate = localDateStr(calDates[dayIdx]);
                    setCalDragging({ ...calDragging, newStart, newEnd, newDate, moved: true });
                  }}
                  onMouseUp={() => {
                    if (calDragging && calDragging.moved) {
                      const updates = {};
                      if (calDragging.newStart) { updates.start = calDragging.newStart; updates.end = calDragging.newEnd; }
                      if (calDragging.newDate) updates.date = calDragging.newDate;
                      editCalEvent(calDragging.id, updates);
                    }
                    setCalDragging(null);
                  }}
                  onMouseLeave={() => {
                    if (calDragging && calDragging.moved) {
                      const updates = {};
                      if (calDragging.newStart) { updates.start = calDragging.newStart; updates.end = calDragging.newEnd; }
                      if (calDragging.newDate) updates.date = calDragging.newDate;
                      editCalEvent(calDragging.id, updates);
                    }
                    setCalDragging(null);
                  }}
                  onTouchMove={(e) => {
                    if (!calDragging || !calGridRef.current) return;
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = calGridRef.current.getBoundingClientRect();
                    const y = touch.clientY - rect.top;
                    const x = touch.clientX - rect.left;
                    const totalMin = Math.round((y / HOUR_H) * 60) + 360;
                    const snapped = Math.round(totalMin / 15) * 15;
                    const duration = timeToMin(calDragging.origEnd) - timeToMin(calDragging.origStart);
                    const newStart = `${String(Math.floor(snapped/60)).padStart(2,"0")}:${String(snapped%60).padStart(2,"0")}`;
                    const endMin = snapped + duration;
                    const newEnd = `${String(Math.floor(endMin/60)).padStart(2,"0")}:${String(endMin%60).padStart(2,"0")}`;
                    const colW = (rect.width - 40) / 7;
                    const dayIdx = Math.max(0, Math.min(6, Math.floor((x - 40) / colW)));
                    const newDate = localDateStr(calDates[dayIdx]);
                    setCalDragging({ ...calDragging, newStart, newEnd, newDate, moved: true });
                  }}
                  onTouchEnd={() => {
                    if (calDragging && calDragging.moved) {
                      const updates = {};
                      if (calDragging.newStart) { updates.start = calDragging.newStart; updates.end = calDragging.newEnd; }
                      if (calDragging.newDate) updates.date = calDragging.newDate;
                      editCalEvent(calDragging.id, updates);
                    }
                    setCalDragging(null);
                  }}
                >
                  {/* Hour labels + grid lines */}
                  {hours.map((h, hi) => (
                    <React.Fragment key={h}>
                      <div style={{ gridColumn: "1", gridRow: hi + 1, fontSize: 9, color: "#555566", textAlign: "right", paddingRight: 6, paddingTop: 2, height: HOUR_H, borderTop: "1px solid #2d2d3a22" }}>{fmtHour(h)}</div>
                      {calDates.map((d, di) => (
                        <div key={di} style={{ gridColumn: di + 2, gridRow: hi + 1, borderTop: "1px solid #2d2d3a44", borderLeft: "1px solid #2d2d3a22", height: HOUR_H, cursor: "pointer", position: "relative" }}
                          onClick={() => {
                            if (calDragging) return; // don't open add modal after drag
                            const ds = localDateStr(d);
                            setCalAddEvent(ds);
                            setCalEventStart(`${String(h).padStart(2,"0")}:00`);
                            setCalEventEnd(`${String(h+1).padStart(2,"0")}:00`);
                            setCalEventTitle(""); setCalEventRepeat("none"); setCalEventDesc("");
                          }} />
                      ))}
                    </React.Fragment>
                  ))}

                  {/* Events overlay */}
                  {calDates.map((d, di) => {
                    const ds = localDateStr(d);
                    const dayEvents = getEventsForDate(ds);
                    return dayEvents.map(evt => {
                      const isDraggingThis = calDragging && calDragging.id === (evt._origId || evt.id);
                      if (isDraggingThis && calDragging.newDate && calDragging.newDate !== ds) return null; // hide from original column
                      const displayStart = isDraggingThis && calDragging.newStart ? calDragging.newStart : evt.start;
                      const displayEnd = isDraggingThis && calDragging.newEnd ? calDragging.newEnd : evt.end;
                      const startMin = timeToMin(displayStart);
                      const endMin = timeToMin(displayEnd);
                      const topPx = ((startMin - 360) / 60) * HOUR_H;
                      const heightPx = Math.max(((endMin - startMin) / 60) * HOUR_H, 20);
                      const fmtTime = (t) => { const [h,m] = t.split(":"); const hr = parseInt(h); const ampm = hr >= 12 ? "pm" : "am"; return `${hr > 12 ? hr-12 : hr || 12}:${m}${ampm}`; };
                      const isRepeating = evt._repeating || evt.repeat;
                      // If dragging to a different day, render at that column
                      let displayDi = di;
                      if (isDraggingThis && calDragging.newDate) {
                        const idx = calDates.findIndex(cd => localDateStr(cd) === calDragging.newDate);
                        if (idx >= 0) displayDi = idx;
                      }
                      return (
                        <div key={evt.id} style={{
                          position: "absolute", left: `calc(40px + ${displayDi} * ((100% - 40px) / 7) + 1px)`, width: `calc((100% - 40px) / 7 - 3px)`,
                          top: topPx, height: heightPx, background: evt.color || "#4fc3f7", borderRadius: 4, padding: "2px 4px", overflow: "hidden",
                          fontSize: 9, color: "#fff", fontWeight: 700, cursor: isDraggingThis ? "grabbing" : "grab", zIndex: isDraggingThis ? 30 : 10,
                          boxShadow: isDraggingThis ? "0 4px 12px #00000088" : "0 1px 3px #00000044", lineHeight: 1.2,
                          borderLeft: isRepeating ? "3px solid #ffffff88" : "none", opacity: isDraggingThis ? 0.85 : 1,
                          transition: isDraggingThis ? "none" : "top 0.15s, height 0.15s", userSelect: "none",
                        }}
                          onClick={(e) => { e.stopPropagation();
                            if (calDragging && calDragging.moved) return; // don't open popup after drag
                            const origId = evt._origId || evt.id;
                            const origEvt = calEvents.find(ev => ev.id === origId) || evt;
                            setCalSelectedEvent({ ...origEvt, _displayDate: ds });
                            setCalEditMode(false);
                          }}
                          onMouseDown={(e) => { e.stopPropagation(); e.preventDefault();
                            const origId = evt._origId || evt.id;
                            if (evt._repeating) return;
                            setCalDragging({ id: origId, origStart: evt.start, origEnd: evt.end, moved: false });
                          }}
                          onTouchStart={(e) => {
                            const origId = evt._origId || evt.id;
                            if (evt._repeating) return;
                            const timer = setTimeout(() => {
                              setCalDragging({ id: origId, origStart: evt.start, origEnd: evt.end, moved: false });
                            }, 400);
                            e.currentTarget._dragTimer = timer;
                          }}
                          onTouchEnd={(e) => { clearTimeout(e.currentTarget._dragTimer); }}
                        >
                          <div style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{isRepeating ? "\u21BB " : ""}{evt.title}</div>
                          {heightPx > 24 && <div style={{ fontSize: 8, opacity: 0.8, fontWeight: 600 }}>{fmtTime(displayStart)} - {fmtTime(displayEnd)}</div>}
                        </div>
                      );
                    });
                  })}

                  {/* Current time indicator */}
                  {calWeekOffset === 0 && (() => {
                    const now = new Date();
                    const nowDay = (now.getDay() + 6) % 7;
                    const nowMin = now.getHours() * 60 + now.getMinutes();
                    const topPx = ((nowMin - 360) / 60) * HOUR_H;
                    if (topPx < 0 || topPx > hours.length * HOUR_H) return null;
                    return (
                      <div style={{ position: "absolute", left: `calc(40px + ${nowDay} * ((100% - 40px) / 7))`, width: `calc((100% - 40px) / 7)`, top: topPx, height: 2, background: "#e84118", zIndex: 20, pointerEvents: "none" }}>
                        <div style={{ position: "absolute", left: -4, top: -4, width: 10, height: 10, borderRadius: "50%", background: "#e84118" }} />
                      </div>
                    );
                  })()}
                </div>
              </div>

              {/* Event detail popup */}
              {calSelectedEvent && !calEditMode && (() => {
                const evt = calSelectedEvent;
                const fmtTime = (t) => { const [h,m] = t.split(":"); const hr = parseInt(h); const ampm = hr >= 12 ? "PM" : "AM"; return `${hr > 12 ? hr-12 : hr || 12}:${m} ${ampm}`; };
                const dateObj = new Date(evt._displayDate + "T12:00");
                const repeatLabel = evt.repeat === "weekly" ? "Weekly" : evt.repeat === "daily" ? "Daily" : evt.repeat === "weekdays" ? "Weekdays" : null;
                return (
                  <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "#000000aa", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}
                    onClick={() => setCalSelectedEvent(null)}>
                    <div style={{ background: "#fff", borderRadius: 14, maxWidth: 360, width: "100%", overflow: "hidden", boxShadow: "0 8px 32px #00000044" }}
                      onClick={(e) => e.stopPropagation()}>
                      {/* Color bar top */}
                      <div style={{ height: 6, background: evt.color || "#4fc3f7" }} />
                      {/* Action bar */}
                      <div style={{ display: "flex", justifyContent: "flex-end", gap: 4, padding: "10px 14px 0" }}>
                        <button onClick={() => { setCalEditMode(true); setCalEventTitle(evt.title); setCalEventStart(evt.start); setCalEventEnd(evt.end); setCalEventColor(evt.color || "#4fc3f7"); setCalEventRepeat(evt.repeat || "none"); setCalEventDesc(evt.desc || ""); }}
                          style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#555", padding: "4px 8px" }}>{"\u270E"}</button>
                        <button onClick={() => {
                          if (evt.repeat) { if (confirm("Delete ALL repeating instances?")) { deleteCalEvent(evt.id, true); setCalSelectedEvent(null); } }
                          else { deleteCalEvent(evt.id); setCalSelectedEvent(null); }
                        }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#555", padding: "4px 8px" }}>{"\uD83D\uDDD1"}</button>
                        <button onClick={() => setCalSelectedEvent(null)}
                          style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#555", padding: "4px 8px" }}>{"\u2715"}</button>
                      </div>
                      {/* Content */}
                      <div style={{ padding: "4px 20px 20px" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                          <div style={{ width: 14, height: 14, borderRadius: 4, background: evt.color || "#4fc3f7", flexShrink: 0 }} />
                          <h3 style={{ fontSize: 20, fontWeight: 600, color: "#1a1a2e", margin: 0 }}>{evt.title}</h3>
                        </div>
                        <div style={{ fontSize: 13, color: "#555", marginBottom: 4 }}>
                          {dateObj.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })} {"\u00B7"} {fmtTime(evt.start)} - {fmtTime(evt.end)}
                        </div>
                        {repeatLabel && <div style={{ fontSize: 12, color: "#7c3aed", marginBottom: 8 }}>{"\u21BB"} {repeatLabel}</div>}
                        {evt.desc && (
                          <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid #eee" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                              <span style={{ fontSize: 14 }}>{"\u2630"}</span>
                              <span style={{ fontSize: 12, color: "#888" }}>Description</span>
                            </div>
                            <div style={{ fontSize: 13, color: "#333", whiteSpace: "pre-wrap", lineHeight: 1.5 }}>{evt.desc}</div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })()}

              {/* Edit event modal */}
              {calSelectedEvent && calEditMode && (
                <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "#000000aa", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}
                  onClick={() => { setCalSelectedEvent(null); setCalEditMode(false); }}>
                  <div style={{ background: "#1a1a2e", border: "1px solid #2d2d3a", borderRadius: 14, padding: 20, maxWidth: 340, width: "100%" }}
                    onClick={(e) => e.stopPropagation()}>
                    <h3 style={{ fontSize: 13, fontWeight: 800, color: "#f0f0f4", letterSpacing: 2, marginBottom: 16 }}>EDIT EVENT</h3>
                    <label style={{ fontSize: 9, color: "#8b8b9e", letterSpacing: 2, fontWeight: 700, display: "block", marginBottom: 4 }}>TITLE</label>
                    <input style={S.inp} value={calEventTitle} onChange={(e) => setCalEventTitle(e.target.value)} autoFocus />
                    <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
                      <div style={{ flex: 1 }}><label style={{ fontSize: 9, color: "#8b8b9e", letterSpacing: 2, fontWeight: 700, display: "block", marginBottom: 4 }}>START</label>
                        <input type="time" style={S.inp} value={calEventStart} onChange={(e) => setCalEventStart(e.target.value)} /></div>
                      <div style={{ flex: 1 }}><label style={{ fontSize: 9, color: "#8b8b9e", letterSpacing: 2, fontWeight: 700, display: "block", marginBottom: 4 }}>END</label>
                        <input type="time" style={S.inp} value={calEventEnd} onChange={(e) => setCalEventEnd(e.target.value)} /></div>
                    </div>
                    <label style={{ fontSize: 9, color: "#8b8b9e", letterSpacing: 2, fontWeight: 700, display: "block", marginBottom: 4, marginTop: 8 }}>DESCRIPTION</label>
                    <textarea style={{ ...S.inp, minHeight: 60, resize: "vertical" }} value={calEventDesc} onChange={(e) => setCalEventDesc(e.target.value)} placeholder="Add details..." />
                    <label style={{ fontSize: 9, color: "#8b8b9e", letterSpacing: 2, fontWeight: 700, display: "block", marginBottom: 4, marginTop: 8 }}>REPEAT</label>
                    <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
                      {[["none","None"],["daily","Daily"],["weekdays","Weekdays"],["weekly","Weekly"]].map(([v,l]) => (
                        <button key={v} onClick={() => setCalEventRepeat(v)} style={{ flex: 1, padding: "8px 4px", borderRadius: 8, fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", letterSpacing: 1, border: calEventRepeat === v ? "2px solid #7c3aed" : "1px solid #2d2d3a", background: calEventRepeat === v ? "#7c3aed22" : "#12122a", color: calEventRepeat === v ? "#c4b5fd" : "#8b8b9e" }}>{l}</button>
                      ))}
                    </div>
                    <label style={{ fontSize: 9, color: "#8b8b9e", letterSpacing: 2, fontWeight: 700, display: "block", marginBottom: 4 }}>COLOR</label>
                    <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
                      {["#4fc3f7","#4cd137","#7c3aed","#ffd43b","#e84118","#ff6b81","#00d9ff","#636e72"].map(c => (
                        <button key={c} onClick={() => setCalEventColor(c)} style={{ width: 28, height: 28, borderRadius: 14, background: c, border: calEventColor === c ? "3px solid #fff" : "2px solid transparent", cursor: "pointer" }} />
                      ))}
                    </div>
                    <div style={{ display: "flex", gap: 10 }}>
                      <button onClick={() => { setCalEditMode(false); }} style={S.cBtn}>Cancel</button>
                      <button onClick={() => {
                        editCalEvent(calSelectedEvent.id, { title: calEventTitle.trim(), start: calEventStart, end: calEventEnd, color: calEventColor, repeat: calEventRepeat === "none" ? undefined : calEventRepeat, desc: calEventDesc.trim() || undefined });
                        setCalSelectedEvent(null); setCalEditMode(false);
                      }} style={S.okBtn}>Save</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Add event modal */}
              {calAddEvent && (
                <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "#000000aa", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}
                  onClick={() => setCalAddEvent(null)}>
                  <div style={{ background: "#1a1a2e", border: "1px solid #2d2d3a", borderRadius: 14, padding: 20, maxWidth: 340, width: "100%" }}
                    onClick={(e) => e.stopPropagation()}>
                    <h3 style={{ fontSize: 13, fontWeight: 800, color: "#f0f0f4", letterSpacing: 2, marginBottom: 16 }}>ADD EVENT - {new Date(calAddEvent + "T12:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })}</h3>
                    <label style={{ fontSize: 9, color: "#8b8b9e", letterSpacing: 2, fontWeight: 700, display: "block", marginBottom: 4 }}>TITLE</label>
                    <input style={S.inp} value={calEventTitle} onChange={(e) => setCalEventTitle(e.target.value)} placeholder="Event name" autoFocus />
                    <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
                      <div style={{ flex: 1 }}><label style={{ fontSize: 9, color: "#8b8b9e", letterSpacing: 2, fontWeight: 700, display: "block", marginBottom: 4 }}>START</label>
                        <input type="time" style={S.inp} value={calEventStart} onChange={(e) => setCalEventStart(e.target.value)} /></div>
                      <div style={{ flex: 1 }}><label style={{ fontSize: 9, color: "#8b8b9e", letterSpacing: 2, fontWeight: 700, display: "block", marginBottom: 4 }}>END</label>
                        <input type="time" style={S.inp} value={calEventEnd} onChange={(e) => setCalEventEnd(e.target.value)} /></div>
                    </div>
                    <label style={{ fontSize: 9, color: "#8b8b9e", letterSpacing: 2, fontWeight: 700, display: "block", marginBottom: 4, marginTop: 8 }}>DESCRIPTION</label>
                    <textarea style={{ ...S.inp, minHeight: 60, resize: "vertical" }} value={calEventDesc} onChange={(e) => setCalEventDesc(e.target.value)} placeholder="Add details..." />
                    <label style={{ fontSize: 9, color: "#8b8b9e", letterSpacing: 2, fontWeight: 700, display: "block", marginBottom: 4, marginTop: 8 }}>REPEAT</label>
                    <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
                      {[["none","None"],["daily","Daily"],["weekdays","Weekdays"],["weekly","Weekly"]].map(([v,l]) => (
                        <button key={v} onClick={() => setCalEventRepeat(v)} style={{ flex: 1, padding: "8px 4px", borderRadius: 8, fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", letterSpacing: 1, border: calEventRepeat === v ? "2px solid #7c3aed" : "1px solid #2d2d3a", background: calEventRepeat === v ? "#7c3aed22" : "#12122a", color: calEventRepeat === v ? "#c4b5fd" : "#8b8b9e" }}>{l}</button>
                      ))}
                    </div>
                    <label style={{ fontSize: 9, color: "#8b8b9e", letterSpacing: 2, fontWeight: 700, display: "block", marginBottom: 4 }}>COLOR</label>
                    <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
                      {["#4fc3f7","#4cd137","#7c3aed","#ffd43b","#e84118","#ff6b81","#00d9ff","#636e72"].map(c => (
                        <button key={c} onClick={() => setCalEventColor(c)} style={{ width: 28, height: 28, borderRadius: 14, background: c, border: calEventColor === c ? "3px solid #fff" : "2px solid transparent", cursor: "pointer" }} />
                      ))}
                    </div>
                    <div style={{ display: "flex", gap: 10 }}>
                      <button onClick={() => setCalAddEvent(null)} style={S.cBtn}>Cancel</button>
                      <button onClick={() => {
                        if (calEventTitle.trim()) {
                          addCalEvent(calAddEvent, calEventTitle.trim(), calEventStart, calEventEnd, calEventColor, calEventRepeat, calEventDesc.trim());
                          setCalAddEvent(null); setCalEventRepeat("none"); setCalEventDesc("");
                        }
                      }} style={S.okBtn}>Add Event</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })()}

        <div style={{ height: 80 }} />
      </div>
      <Nav />
    </div>
  );

  const FW = ({ children }) => <div style={S.shell}><div style={S.box}>{children}</div><Nav /></div>;

  if (view === "addHabit") {
    const sec = data.habitSections.find((s) => s.id === editSection);
    return <FW><div style={S.fCard}><h2 style={S.fTitle}>ADD TO {sec?.title}</h2>
      <label style={S.lbl}>Name</label><input style={S.inp} value={formName} onChange={(e) => setFormName(e.target.value)} autoFocus />
      <label style={S.lbl}>Points</label><input style={S.inp} type="number" value={formPoints} onChange={(e) => setFormPoints(e.target.value)} min="1" />
      <label style={S.lbl}>Description (optional)</label><textarea style={S.textarea} value={formDesc} onChange={(e) => setFormDesc(e.target.value)} placeholder="e.g., Mon-Push, Tue-Rest, Wed-Pull..." rows={3} />
      <div style={S.fAct}><button onClick={() => { setView("main"); setFormDesc(""); }} style={S.cBtn}>Cancel</button><button onClick={() => addHabit(editSection)} style={S.okBtn}>Add</button></div>
    </div></FW>;
  }

  if (view === "editHabit" && editItem) {
    return <FW><div style={S.fCard}><h2 style={S.fTitle}>EDIT HABIT</h2>
      <label style={S.lbl}>Name</label><input style={S.inp} value={formName} onChange={(e) => setFormName(e.target.value)} autoFocus />
      <label style={S.lbl}>Points</label><input style={S.inp} type="number" value={formPoints} onChange={(e) => setFormPoints(e.target.value)} min="1" />
      <label style={S.lbl}>Description</label><textarea style={S.textarea} value={formDesc} onChange={(e) => setFormDesc(e.target.value)} placeholder="Add details, schedule, notes..." rows={4} />
      <label style={S.lbl}>{"\uD83D\uDCDD"} Today's Comment</label><textarea style={{ ...S.textarea, borderColor: "#7c3aed44" }} value={formComment} onChange={(e) => setFormComment(e.target.value)} placeholder="e.g., 82.5kg, skipped because sick, did 30 min instead..." rows={2} />
      <label style={S.lbl}>Move to section</label>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 4 }}>
        {data.habitSections.map((sec) => <button key={sec.id} onClick={() => moveHabitTo(sec.id)} style={{ padding: "7px 12px", background: editSection === sec.id ? "#7c3aed33" : "#12122a", border: `1px solid ${editSection === sec.id ? "#7c3aed" : "#2d2d3a"}`, borderRadius: 8, color: editSection === sec.id ? "#7c3aed" : "#8b8b9e", fontSize: 10, cursor: "pointer", fontFamily: "inherit" }}>{sec.icon} {sec.title}</button>)}
      </div>
      <div style={S.fAct}>
        <button onClick={() => deleteHabit(editItem.id)} style={S.dBtn}>Delete</button>
        <button onClick={() => { setView("main"); setEditItem(null); }} style={S.cBtn}>Cancel</button>
        <button onClick={saveHabitEdit} style={S.okBtn}>Save</button>
      </div>
    </div></FW>;
  }

  if (view === "settings") {
    return <FW><div style={S.fCard}><h2 style={S.fTitle}>SETTINGS</h2>
      <label style={S.lbl}>Daily Point Goal</label><input style={S.inp} type="number" value={goalInput} onChange={(e) => setGoalInput(e.target.value)} min="1" />
      <div style={S.fAct}><button onClick={() => setView("main")} style={S.cBtn}>Cancel</button><button onClick={saveGoal} style={S.okBtn}>Save</button></div>
      <div style={{ marginTop: 28, borderTop: "1px solid #2d2d3a", paddingTop: 20 }}>
        <label style={S.lbl}>Sync Code (same code on all devices to sync)</label>
        <input style={S.inp} type="text" value={syncCode} onChange={(e) => setSyncCode(e.target.value.trim())} placeholder="e.g. mycode123" />
        <div style={S.fAct}>
          <button onClick={() => { window._setSyncCode(syncCode || null); alert(syncCode ? "Sync code set! Use the same code on your other devices." : "Sync disabled."); }} style={S.okBtn}>{syncCode ? "Enable Sync" : "Disable Sync"}</button>
          {window._getSyncCode() && <button onClick={() => { window.storage.get("daily-grind-v13"); alert("Syncing from cloud..."); location.reload(); }} style={{ ...S.cBtn, marginLeft: 8 }}>Pull from Cloud</button>}
        </div>
      </div>
      <div style={{ marginTop: 28, borderTop: "1px solid #2d2d3a", paddingTop: 20 }}>
        <button onClick={resetAll} style={{ width: "100%", padding: 11, background: "none", border: "1px solid #ff475733", borderRadius: 8, color: "#ff4757", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", letterSpacing: 2, textTransform: "uppercase" }}>Reset Everything</button>
      </div>
    </div></FW>;
  }
  return null;
}

  noteRow: { marginTop: 10, paddingTop: 8, borderTop: "1px solid #2d2d3a" },
  noteInp: { width: "100%", background: "#12122a", border: "1px solid #2d2d3a", borderRadius: 8, color: "#f0f0f4", fontSize: 12, fontFamily: "inherit", padding: "8px 10px", outline: "none", boxSizing: "border-box" },

  picker: { display: "flex", justifyContent: "center", gap: 10 },

  pickBtn: { width: 44, height: 44, borderRadius: 22, border: "none", fontSize: 20, fontWeight: 900, color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "inherit", boxShadow: "0 2px 8px #00000022", boxSizing: "border-box" },
  commentRow: { display: "flex", gap: 6, marginTop: 10 },
  commentInp: { flex: 1, background: "#12122a", border: "1px solid #2d2d3a", borderRadius: 8, color: "#f0f0f4", fontSize: 12, fontFamily: "inherit", padding: "8px 10px", outline: "none" },

  commentPreview: { marginTop: 8, padding: "6px 10px", background: "#12122a", borderRadius: 8, border: "1px solid #2d2d3a", fontSize: 11, color: "#a78bfa", cursor: "pointer", lineHeight: 1.4 },

  win: { position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "radial-gradient(circle at center,#00ff8722 0%,#f5f5f7ee 60%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", zIndex: 999, pointerEvents: "none" },

  <React.StrictMode><DailyGrind /></React.StrictMode>
);
